services:
  - type: web
    name: dbmaster-studio
    runtime: node
    plan: free
    buildCommand: npm install; npm run build
    startCommand: node dist/server.cjs
    publishDir: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false